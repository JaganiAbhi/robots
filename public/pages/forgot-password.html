<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NanoNinja - Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../css/additions.css" />
    <script>
      (function () {
        function safeToast(msg, type) {
          try {
            if (typeof window.showToast === 'function') window.showToast(msg, type || 'error');
          } catch (e) {}
        }
        window.addEventListener('unhandledrejection', function () {
          safeToast('Something went wrong. Please try again.', 'error');
        });
      })();
    </script>
  </head>
  <body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div id="cursor-orb" class="cursor-orb" aria-hidden="true"></div>
    <div id="cursor-glow" class="cursor-glow" aria-hidden="true"></div>
    <noscript><p>JavaScript is required to use NanoNinja. Please enable it.</p></noscript>

    <main class="nn-auth-page">
      <article class="nn-auth-card">
        <header>
          <h1 class="nn-auth-heading">Forgot your password?</h1>
          <p class="nn-auth-sub">Enter your registered email and we'll send you an OTP</p>
        </header>

        <section id="fpStep1">
          <form id="fpEmailForm" novalidate>
            <div class="nn-form-group">
              <label class="nn-form-label" for="fpEmail">Email</label>
              <input class="nn-form-input" type="email" id="fpEmail" name="email" required autocomplete="email" />
            </div>

            <button class="nn-btn-primary" type="submit" id="sendOTPBtn">Send OTP</button>

            <p>
              <a href="./login.html">Back to login</a>
            </p>
          </form>
        </section>

        <section id="fpStep2" hidden>
          <form id="fpResetForm" novalidate>
            <div class="nn-form-group">
              <label class="nn-form-label" for="fpOTP">Enter OTP</label>
              <input class="nn-form-input" type="text" id="fpOTP" inputmode="numeric" maxlength="6" pattern="\\d{6}" required placeholder="6-digit OTP" />
              <div>
                Check your email for the 6-digit OTP (valid 15 minutes)
              </div>
            </div>

            <div class="nn-form-group">
              <label class="nn-form-label" for="fpNewPassword">New password</label>
              <input class="nn-form-input" type="password" id="fpNewPassword" required />
              <div class="nn-strength-bar" id="fpStrengthBar"></div>
            </div>

            <div class="nn-form-group">
              <label class="nn-form-label" for="fpConfirmPassword">Confirm new password</label>
              <input class="nn-form-input" type="password" id="fpConfirmPassword" required />
            </div>

            <button class="nn-btn-primary" type="submit" id="resetBtn">Reset Password</button>

            <p>
              <a href="#" id="resendOTPLink">Resend OTP</a>
            </p>
          </form>
        </section>
      </article>
    </main>

    <script src="../js/nn-auth/config.js"></script>
    <script src="../js/nn-auth/utils.js"></script>
    <script src="../js/nn-auth/auth.js"></script>
    <script src="../js/nn-auth/api.js"></script>

    <script type="module">
      import { initCursor } from "../js/cursor.js";
      import { initStarfield } from "../js/starfield.js";
      try {
        window.addEventListener("DOMContentLoaded", () => {
          initCursor();
          initStarfield();
        });
      } catch (e) {}
    </script>

    <script>
      const step1 = document.getElementById('fpStep1');
      const step2 = document.getElementById('fpStep2');

      let storedEmail = '';
      let resendTimer = null;
      let resendSecondsLeft = 0;

      const fpEmailInput = document.getElementById('fpEmail');
      const sendBtn = document.getElementById('sendOTPBtn');
      const otpInput = document.getElementById('fpOTP');
      const newPassInput = document.getElementById('fpNewPassword');
      const confirmPassInput = document.getElementById('fpConfirmPassword');
      const resetBtn = document.getElementById('resetBtn');
      const resendLink = document.getElementById('resendOTPLink');
      const strengthBar = document.getElementById('fpStrengthBar');

      function strengthState(pw) {
        const v = pw || '';
        const weak = v.length < 8;
        const hasUpper = /[A-Z]/.test(v);
        const hasLower = /[a-z]/.test(v);
        const hasNum = /\d/.test(v);
        if (weak) return 'weak';
        if (hasUpper && hasLower && hasNum) return 'strong';
        return 'medium';
      }

      function renderStrength() {
        if (!strengthBar) return;
        const st = strengthState(newPassInput ? newPassInput.value : '');
        strengthBar.classList.remove('nn-strength-weak', 'nn-strength-medium', 'nn-strength-strong');
        if (st === 'weak') {
          strengthBar.classList.add('nn-strength-weak');
          strengthBar.style.width = '33%';
          return;
        }
        if (st === 'medium') {
          strengthBar.classList.add('nn-strength-medium');
          strengthBar.style.width = '66%';
          return;
        }
        strengthBar.classList.add('nn-strength-strong');
        strengthBar.style.width = '100%';
      }

      if (newPassInput) {
        newPassInput.addEventListener('input', function () {
          renderStrength();
          clearFieldError('fpNewPassword');
        });
      }
      if (confirmPassInput) {
        confirmPassInput.addEventListener('input', function () {
          clearFieldError('fpConfirmPassword');
        });
      }
      if (otpInput) {
        otpInput.addEventListener('input', function () {
          clearFieldError('fpOTP');
        });
      }
      if (fpEmailInput) {
        fpEmailInput.addEventListener('input', function () {
          clearFieldError('fpEmail');
        });
      }

      function setResendDisabled(seconds) {
        resendSecondsLeft = seconds;
        if (!resendLink) return;
        resendLink.style.pointerEvents = 'none';
        resendLink.style.opacity = '0.65';
        resendLink.textContent = `Resend OTP (${seconds}s)`;

        resendTimer = window.setInterval(function () {
          resendSecondsLeft -= 1;
          if (resendSecondsLeft <= 0) {
            window.clearInterval(resendTimer);
            resendTimer = null;
            resendLink.style.pointerEvents = 'auto';
            resendLink.style.opacity = '1';
            resendLink.textContent = 'Resend OTP';
            return;
          }
          resendLink.textContent = `Resend OTP (${resendSecondsLeft}s)`;
        }, 1000);
      }

      async function resendOtp() {
        try {
          if (!storedEmail) {
            showToast('Please enter your email first.', 'warning');
            return;
          }

          const email = storedEmail.trim();
          const result = validateFields([{ id: 'fpEmail', label: 'Email', required: true, type: 'email' }]);

          // fpEmail input is not in step2, so validate based on storedEmail by using regex-like check:
          if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email)) {
            showToast('Email is invalid. Please try again.', 'error');
            return;
          }

          setButtonLoading('sendOTPBtn', true, 'Send OTP');
          const data = await forgotPassword(email);
          if (!data) return;

          showToast('OTP sent if email exists', 'success');
          setResendDisabled(60);
        } catch (err) {
          if (err && err.message) showToast(err.message, 'error');
        } finally {
          setButtonLoading('sendOTPBtn', false, 'Send OTP');
        }
      }

      if (resendLink) {
        resendLink.addEventListener('click', function (e) {
          e.preventDefault();
          if (resendLink.style.pointerEvents === 'none') return;
          resendOtp();
        });
      }

      const emailForm = document.getElementById('fpEmailForm');
      emailForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearAllErrors('fpEmailForm');

        const email = (fpEmailInput.value || '').trim();

        const result = validateFields([
          { id: 'fpEmail', label: 'Email', required: true, type: 'email' }
        ]);

        if (!result.valid) {
          result.errors.forEach(err => showFieldError(err.id, err.message));
          const first = result.errors[0];
          const el = document.getElementById(first.id);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.focus();
          }
          return;
        }

        setButtonLoading('sendOTPBtn', true, 'Send OTP');
        try {
          const data = await forgotPassword(email);
          if (!data) return;

          showToast('OTP sent if email exists', 'success');
          storedEmail = email;
          step1.hidden = true;
          step2.hidden = false;
          setResendDisabled(60);
          renderStrength();
        } catch (err) {
          const msg = err && err.message ? err.message : String(err);
          if (msg.toLowerCase().includes('network') || msg.toLowerCase().includes('connection')) {
            showToast('Network error. Check your connection.', 'error');
          } else {
            showToast(msg, 'error');
          }
        } finally {
          setButtonLoading('sendOTPBtn', false, 'Send OTP');
        }
      });

      const resetForm = document.getElementById('fpResetForm');
      resetForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearAllErrors('fpResetForm');

        const otp = (otpInput.value || '').trim();
        const newPassword = newPassInput.value || '';
        const confirmPassword = confirmPassInput.value || '';

        const result = validateFields([
          { id: 'fpOTP', label: 'OTP', required: true, pattern: /^\d{6}$/, patternMessage: 'OTP must be 6 digits' },
          { id: 'fpNewPassword', label: 'New password', required: true, type: 'password' }
        ]);

        if (confirmPassword !== newPassword) {
          result.valid = false;
          result.errors.push({ id: 'fpConfirmPassword', message: 'Passwords do not match' });
        }

        if (!result.valid) {
          result.errors.forEach(err => showFieldError(err.id, err.message));
          const first = result.errors[0];
          const el = document.getElementById(first.id);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.focus();
          }
          return;
        }

        setButtonLoading('resetBtn', true, 'Reset Password');
        try {
          const data = await resetPassword(storedEmail, otp, newPassword);
          if (!data) return;

          showToast('Password reset! Please login.', 'success');
          window.setTimeout(function () {
            window.location.href =
              (window.CONFIG && window.CONFIG.AUTH_PREFIX ? window.CONFIG.AUTH_PREFIX : '') + '/pages/login.html';
          }, 2000);
        } catch (err) {
          const msg = err && err.message ? err.message : String(err);
          if (msg === 'OTP is invalid or has expired') {
            showFieldError('fpOTP', 'OTP is invalid or has expired');
            return;
          }
          if (msg.toLowerCase().includes('network') || msg.toLowerCase().includes('connection')) {
            showToast('Network error. Check your connection.', 'error');
            return;
          }
          showToast(msg, 'error');
        } finally {
          setButtonLoading('resetBtn', false, 'Reset Password');
        }
      });
    </script>
  </body>
</html>
