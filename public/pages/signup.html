<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NanoNinja - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../css/additions.css" />
    <script>
      (function () {
        function safeToast(msg, type) {
          try {
            if (typeof window.showToast === 'function') window.showToast(msg, type || 'error');
          } catch (e) {}
        }

        window.addEventListener('error', function () {
          safeToast('Something went wrong. Please try again.', 'error');
        });
        window.addEventListener('unhandledrejection', function () {
          safeToast('Something went wrong. Please try again.', 'error');
        });
      })();
    </script>
  </head>
  <body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div id="cursor-orb" class="cursor-orb" aria-hidden="true"></div>
    <div id="cursor-glow" class="cursor-glow" aria-hidden="true"></div>
    <noscript><p>JavaScript is required to use NanoNinja. Please enable it.</p></noscript>

    <main class="nn-auth-page">
      <article class="nn-auth-card">
        <header>
          <h1 class="nn-auth-heading">Create your account</h1>
          <p class="nn-auth-sub">Get started in minutes</p>
        </header>

        <form id="signupForm" novalidate>
          <div class="nn-two-col">
            <div class="nn-form-group">
              <label class="nn-form-label" for="signupName">Full name</label>
              <input class="nn-form-input" type="text" id="signupName" name="name" maxlength="50" required />
            </div>

            <div class="nn-form-group">
              <label class="nn-form-label" for="signupEmail">Email</label>
              <input class="nn-form-input" type="email" id="signupEmail" name="email" required />
            </div>
          </div>

          <div class="nn-form-group">
            <label class="nn-form-label" for="signupPassword">Password</label>
            <input class="nn-form-input" type="password" id="signupPassword" name="password" required />
            <div class="nn-strength-bar" id="signupStrengthBar"></div>
          </div>

          <div class="nn-form-group">
            <label class="nn-form-label" for="signupConfirm">Confirm password</label>
            <input class="nn-form-input" type="password" id="signupConfirm" name="confirmPassword" required />
          </div>

          <div class="nn-two-col">
            <div class="nn-form-group">
              <label class="nn-form-label" for="signupPhone">Phone (optional)</label>
              <input class="nn-form-input" type="text" id="signupPhone" name="phone" inputmode="numeric" placeholder="10 digits" />
            </div>

            <div class="nn-form-group">
              <label class="nn-form-label" for="signupCompany">Company (optional)</label>
              <input class="nn-form-input" type="text" id="signupCompany" name="company" />
            </div>
          </div>

          <div class="nn-two-col">
            <div class="nn-form-group">
              <label class="nn-form-label" for="signupGST">GST (optional)</label>
              <input class="nn-form-input" type="text" id="signupGST" name="gst" />
            </div>

            <div class="nn-form-group">
              <label class="nn-form-label" for="signupDesignation">Designation (optional)</label>
              <input class="nn-form-input" type="text" id="signupDesignation" name="designation" />
            </div>
          </div>

          <button class="nn-btn-primary" type="submit" id="signupBtn">Sign Up</button>

          <p>
            Already have an account?
            <a href="./login.html">Login</a>
          </p>
        </form>
      </article>
    </main>

    <script src="../js/nn-auth/config.js"></script>
    <script src="../js/nn-auth/utils.js"></script>
    <script src="../js/nn-auth/auth.js"></script>
    <script src="../js/nn-auth/api.js"></script>

    <script type="module">
      import { initCursor } from "../js/cursor.js";
      import { initStarfield } from "../js/starfield.js";
      try {
        window.addEventListener("DOMContentLoaded", () => {
          initCursor();
          initStarfield();
        });
      } catch (e) {}
    </script>

    <script>
      redirectIfLoggedIn();

      const nameEl = document.getElementById('signupName');
      const emailEl = document.getElementById('signupEmail');
      const passEl = document.getElementById('signupPassword');
      const confirmEl = document.getElementById('signupConfirm');
      const phoneEl = document.getElementById('signupPhone');
      const barEl = document.getElementById('signupStrengthBar');

      function strengthState(pw) {
        const v = pw || '';
        const weak = v.length < 8;
        const hasUpper = /[A-Z]/.test(v);
        const hasLower = /[a-z]/.test(v);
        const hasNum = /\d/.test(v);
        if (weak) return 'weak';
        if (hasUpper && hasLower && hasNum) return 'strong';
        return 'medium';
      }

      function renderStrength() {
        if (!barEl) return;
        const v = passEl ? passEl.value : '';
        const st = strengthState(v);
        barEl.classList.remove('nn-strength-weak', 'nn-strength-medium', 'nn-strength-strong');
        if (st === 'weak') {
          barEl.classList.add('nn-strength-weak');
          barEl.style.width = '33%';
          return;
        }
        if (st === 'medium') {
          barEl.classList.add('nn-strength-medium');
          barEl.style.width = '66%';
          return;
        }
        barEl.classList.add('nn-strength-strong');
        barEl.style.width = '100%';
      }

      if (passEl) {
        passEl.addEventListener('input', function () {
          renderStrength();
          clearFieldError('signupPassword');
        });
      }

      if (confirmEl) {
        confirmEl.addEventListener('blur', function () {
          clearFieldError('signupConfirm');
          if (confirmEl.value !== (passEl ? passEl.value : '')) {
            showFieldError('signupConfirm', 'Passwords do not match');
          }
        });
      }

      // Clear server/client errors on typing
      ['signupName', 'signupEmail', 'signupPassword', 'signupConfirm', 'signupPhone', 'signupCompany', 'signupGST', 'signupDesignation'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', function () {
          clearFieldError(id);
        });
      });

      const form = document.getElementById('signupForm');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearAllErrors('signupForm');

        const name = (nameEl.value || '').trim();
        const email = (emailEl.value || '').trim();
        const password = passEl.value || '';
        const confirmPassword = confirmEl.value || '';
        const phone = (phoneEl.value || '').trim();
        const company = (document.getElementById('signupCompany').value || '').trim();
        const gst = (document.getElementById('signupGST').value || '').trim();
        const designation = (document.getElementById('signupDesignation').value || '').trim();

        const result = validateFields([
          { id: 'signupName', label: 'Full name', required: true, maxLength: 50 },
          { id: 'signupEmail', label: 'Email', required: true, type: 'email' },
          { id: 'signupPassword', label: 'Password', required: true, type: 'password' },
          { id: 'signupPhone', label: 'Phone', required: false, type: 'phone' }
        ]);

        // Confirm password match validation
        if (confirmPassword !== password) {
          result.valid = false;
          result.errors.push({ id: 'signupConfirm', message: 'Passwords do not match' });
        }

        if (!result.valid) {
          result.errors.forEach(err => showFieldError(err.id, err.message));
          const first = result.errors[0];
          const el = document.getElementById(first.id);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.focus();
          }
          return;
        }

        setButtonLoading('signupBtn', true, 'Sign Up');
        try {
          const data = await signup(name, email, password, phone || undefined, company || undefined, gst || undefined, designation || undefined);
          if (!data) return; // redirected due to 401

          saveAuth(data.token, data.user);
          showToast('Account created! Welcome to NanoNinja', 'success');
          window.location.href =
            (window.CONFIG && window.CONFIG.AUTH_PREFIX ? window.CONFIG.AUTH_PREFIX : '') + '/pages/dashboard.html';
        } catch (err) {
          setButtonLoading('signupBtn', false, 'Sign Up');
          const msg = err && err.message ? err.message : String(err);

          if (msg === 'Email already registered') {
            showFieldError('signupEmail', 'Email already registered');
            return;
          }

          if (msg.toLowerCase().includes('network') || msg.toLowerCase().includes('connection')) {
            showToast('Network error. Check your connection.', 'error');
            return;
          }

          showToast(msg, 'error');
        }
      });
    </script>
  </body>
</html>
