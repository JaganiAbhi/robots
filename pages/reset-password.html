<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NanoNinja - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../css/additions.css" />
    <script>
      (function () {
        function safeToast(msg, type) {
          try {
            if (typeof window.showToast === 'function') window.showToast(msg, type || 'error');
          } catch (e) {}
        }
        window.addEventListener('unhandledrejection', function () {
          safeToast('Something went wrong. Please try again.', 'error');
        });
      })();
    </script>
  </head>
  <body>
    <canvas id="starfield" aria-hidden="true"></canvas>
    <div id="cursor-orb" class="cursor-orb" aria-hidden="true"></div>
    <div id="cursor-glow" class="cursor-glow" aria-hidden="true"></div>
    <noscript><p>JavaScript is required to use NanoNinja. Please enable it.</p></noscript>

    <main class="nn-auth-page">
      <article class="nn-auth-card">
        <header>
          <h1 class="nn-auth-heading">Reset password</h1>
          <p class="nn-auth-sub">Enter your email, OTP, and new password</p>
        </header>

        <form id="rpForm" novalidate>
          <div class="nn-form-group">
            <label class="nn-form-label" for="rpEmail">Email</label>
            <input class="nn-form-input" type="email" id="rpEmail" name="email" autocomplete="email" required />
          </div>

          <div class="nn-form-group">
            <label class="nn-form-label" for="rpOTP">OTP</label>
            <input class="nn-form-input" type="text" id="rpOTP" inputmode="numeric" maxlength="6" required placeholder="6-digit OTP" />
          </div>

          <div class="nn-form-group">
            <label class="nn-form-label" for="rpNewPassword">New password</label>
            <input class="nn-form-input" type="password" id="rpNewPassword" required />
            <div class="nn-strength-bar" id="rpStrengthBar"></div>
          </div>

          <div class="nn-form-group">
            <label class="nn-form-label" for="rpConfirmPassword">Confirm new password</label>
            <input class="nn-form-input" type="password" id="rpConfirmPassword" required />
          </div>

          <button class="nn-btn-primary" type="submit" id="rpResetBtn">Reset Password</button>

          <p>
            <a href="./login.html">Back to login</a>
          </p>
        </form>
      </article>
    </main>

    <script src="../js/nn-auth/config.js"></script>
    <script src="../js/nn-auth/utils.js"></script>
    <script src="../js/nn-auth/auth.js"></script>
    <script src="../js/nn-auth/api.js"></script>

    <script type="module">
      import { initCursor } from "../js/cursor.js";
      import { initStarfield } from "../js/starfield.js";
      try {
        window.addEventListener("DOMContentLoaded", () => {
          initCursor();
          initStarfield();
        });
      } catch (e) {}
    </script>

    <script>
      redirectIfLoggedIn();

      const emailEl = document.getElementById('rpEmail');
      const otpEl = document.getElementById('rpOTP');
      const newPassEl = document.getElementById('rpNewPassword');
      const confirmEl = document.getElementById('rpConfirmPassword');
      const resetBtn = document.getElementById('rpResetBtn');
      const barEl = document.getElementById('rpStrengthBar');

      function strengthState(pw) {
        const v = pw || '';
        const weak = v.length < 8;
        const hasUpper = /[A-Z]/.test(v);
        const hasLower = /[a-z]/.test(v);
        const hasNum = /\d/.test(v);
        if (weak) return 'weak';
        if (hasUpper && hasLower && hasNum) return 'strong';
        return 'medium';
      }

      function renderStrength() {
        if (!barEl || !newPassEl) return;
        const st = strengthState(newPassEl.value || '');
        barEl.classList.remove('nn-strength-weak', 'nn-strength-medium', 'nn-strength-strong');
        if (st === 'weak') { barEl.classList.add('nn-strength-weak'); barEl.style.width = '33%'; return; }
        if (st === 'medium') { barEl.classList.add('nn-strength-medium'); barEl.style.width = '66%'; return; }
        barEl.classList.add('nn-strength-strong'); barEl.style.width = '100%';
      }

      if (newPassEl) {
        newPassEl.addEventListener('input', function () {
          renderStrength();
          clearFieldError('rpNewPassword');
        });
      }
      if (confirmEl) {
        confirmEl.addEventListener('input', function () {
          clearFieldError('rpConfirmPassword');
        });
      }
      if (otpEl) {
        otpEl.addEventListener('input', function () {
          clearFieldError('rpOTP');
        });
      }
      if (emailEl) {
        emailEl.addEventListener('input', function () {
          clearFieldError('rpEmail');
        });
      }

      // Support optional ?email= query prefill
      try {
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        if (emailEl && email) emailEl.value = email;
      } catch (e) {}

      const form = document.getElementById('rpForm');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearAllErrors('rpForm');

        const email = (emailEl.value || '').trim();
        const otp = (otpEl.value || '').trim();
        const newPassword = newPassEl.value || '';
        const confirmPassword = confirmEl.value || '';

        const result = validateFields([
          { id: 'rpEmail', label: 'Email', required: true, type: 'email' },
          { id: 'rpOTP', label: 'OTP', required: true, pattern: /^\d{6}$/, patternMessage: 'OTP must be 6 digits' },
          { id: 'rpNewPassword', label: 'New password', required: true, type: 'password' }
        ]);

        if (confirmPassword !== newPassword) {
          result.valid = false;
          result.errors.push({ id: 'rpConfirmPassword', message: 'Passwords do not match' });
        }

        if (!result.valid) {
          result.errors.forEach(err => showFieldError(err.id, err.message));
          const first = result.errors[0];
          const el = document.getElementById(first.id);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.focus();
          }
          return;
        }

        setButtonLoading('rpResetBtn', true, 'Reset Password');
        try {
          const data = await resetPassword(email, otp, newPassword);
          if (!data) return;
          showToast('Password reset successful. Please login.', 'success');
          window.setTimeout(function () {
            window.location.href =
              (window.CONFIG && window.CONFIG.AUTH_PREFIX ? window.CONFIG.AUTH_PREFIX : '') + '/pages/login.html';
          }, 2000);
        } catch (err) {
          const msg = err && err.message ? err.message : String(err);
          if (msg === 'OTP is invalid or has expired') {
            showFieldError('rpOTP', 'OTP is invalid or has expired');
            return;
          }
          if (msg.toLowerCase().includes('network') || msg.toLowerCase().includes('connection')) {
            showToast('Network error. Check your connection.', 'error');
            return;
          }
          showToast(msg, 'error');
        } finally {
          setButtonLoading('rpResetBtn', false, 'Reset Password');
        }
      });

      renderStrength();
    </script>
  </body>
</html>
