services:
  - type: web
    name: nexus-app
    env: node
    plan: free
    # Since the codebase is in a specific folder structure:
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        # Render will prompt the user to enter their MongoDB URI securely
        sync: false
